<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi carrito | Alana</title>
    <meta name="description" content="Revisá, editá y confirmá los productos de tu carrito en Alana.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="../../estilos_navbar_&_footer.css">
    <link rel="stylesheet" href="../../estilos_index.css">
    <link rel="stylesheet" href="../paginas-internas.css">
</head>
<body>

    <a href="#contenido-principal" class="salto-enlace">Saltar al contenido principal</a>

    <header class="cabecera">
        <div class="cabecera__fila">
            <a href="../../index.html" class="logo" aria-label="Alana, ir al inicio">
                <img src="../../assets/logo-alana.svg" alt="Alana" class="logo__imagen">
            </a>
            <div class="cabecera__acciones" style="margin-left:auto;">
                <a href="../registro_&_login/login.html" class="accion">
                    <i class="fa-regular fa-user" aria-hidden="true"></i><span>Ingresar</span>
                </a>
                <a href="carrito.html" class="accion accion--carrito">
                    <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i><span>Carrito</span>
                    <span class="contador-carrito" id="contador-carrito" aria-live="polite">0</span>
                </a>
            </div>
        </div>
    </header>

    <main id="contenido-principal" class="pagina-interna">
        <h1>Mi carrito</h1>

        <p id="carrito-vacio" class="mensaje-estado" style="display:none;">
            Todavía no agregaste productos. <a href="../../index.html">Ir a comprar</a>
        </p>

        <div class="carrito-layout">
            <div id="lista-carrito" class="lista-carrito">
                <!-- Filas generadas dinámicamente por main.js -->
            </div>

            <aside class="resumen-carrito">
                <h2>Resumen</h2>
                <p>Productos: <strong id="carrito-cantidad-items">0</strong></p>
                <p class="resumen-carrito__total">Total: $<span id="carrito-total">0.00</span></p>
                <a href="../pago/pago.html" id="btn-ir-a-pagar" class="boton boton--primario boton--ancho">
                    Ir a pagar
                </a>
            </aside>
        </div>
    </main>

    <footer class="pie">
        <p class="pie__copy">&copy; 2026 Alana. Todos los derechos reservados .</p>
    </footer>

    <script src="../../main.js" defer></script>
    <script src="../../navbar.js" defer></script>
    <script src="../../productos.js" defer></script>
</body>
</html>
