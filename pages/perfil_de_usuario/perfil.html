<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi perfil | Alana</title>
    <meta name="description" content="Gestioná tus datos personales en Alana.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="../../estilos_navbar_&_footer.css">
    <link rel="stylesheet" href="../../estilos_index.css">
    <link rel="stylesheet" href="../paginas-internas.css">
</head>
<body>

    <a href="#contenido-principal" class="salto-enlace">Saltar al contenido principal</a>

    <header class="cabecera">
        <div class="cabecera__fila">
            <a href="../../index.html" class="logo" aria-label="Alana, ir al inicio">
               <img src="../../assets/logo-alana.svg" alt="Alana" class="logo__imagen">
            </a>
            <div class="cabecera__acciones" style="margin-left:auto;">
                <a href="../carrito/carrito.html" class="accion accion--carrito">
                    <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i><span>Carrito</span>
                    <span class="contador-carrito" id="contador-carrito" aria-live="polite">0</span>
                </a>
            </div>
        </div>
    </header>

    <main id="contenido-principal" class="pagina-interna">
        <h1>Mi perfil</h1>

        <form class="tarjeta-formulario" novalidate>
            <div class="grupo-formulario">
                <label for="perfil-nombre">Nombre</label>
                <input type="text" id="perfil-nombre" name="nombre" required>
                <span class="error-campo"></span>
            </div>
            <div class="grupo-formulario">
                <label for="perfil-email">Correo electrónico</label>
                <input type="email" id="perfil-email" name="email" required>
                <span class="error-campo"></span>
            </div>
            <div class="grupo-formulario">
                <label for="perfil-direccion">Dirección de envío</label>
                <input type="text" id="perfil-direccion" name="direccion">
                <span class="error-campo"></span>
            </div>
            <button type="submit" class="boton boton--primario boton--ancho">Guardar cambios</button>
        </form>
    </main>

    <footer class="pie">
        <p class="pie__copy">&copy; 2026 Alana. Todos los derechos reservados .</p>
    </footer>

    <script src="../../main.js" defer></script>
    <script src="../../navbar.js" defer></script>
</body>
</html>
